# ============================================================
# docker-compose.yml — EpicBook full-stack with Nginx reverse proxy
# ============================================================
# Services:
#   nginx    — reverse proxy, serves on port 80
#   frontend — React app (served as static files via Nginx)
#   backend  — Node.js/Express API
#   db       — MySQL 8 database
#
# Run:        docker compose up -d
# Tear down:  docker compose down -v   (removes containers AND volumes)
# Logs:       docker compose logs -f backend

services:

  # -- Nginx reverse proxy --
  # All traffic enters through Nginx on port 80.
  # Nginx routes /api/* requests to the backend and all other
  # requests to the frontend static files.
  nginx:
    image: nginx:1.25-alpine       # alpine = minimal image, smaller attack surface
    container_name: epicbook-nginx
    ports:
      - "80:80"                    # only nginx exposes a port to the host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro   # :ro = read-only mount
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - epicbook-net

  # -- React frontend --
  # Built as a multi-stage Docker build: Node builds the static files,
  # then Nginx serves them. Build stage is discarded, keeping image small.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: epicbook-frontend
    environment:
      - REACT_APP_API_URL=/api   # relative URL so it works behind any proxy
    networks:
      - epicbook-net

  # -- Node.js backend API --
  # Handles all /api/* requests proxied by Nginx.
  # Environment variables come from .env file — never hardcoded.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epicbook-backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db                         # service name = hostname inside Docker network
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}             # loaded from .env file
      - DB_USER=${DB_USER}             # loaded from .env file
      - DB_PASSWORD=${DB_PASSWORD}     # loaded from .env file
    env_file:
      - .env                               # create from .env.example — never commit .env
    depends_on:
      db:
        condition: service_healthy         # wait until MySQL passes its healthcheck
    restart: unless-stopped
    networks:
      - epicbook-net

  # -- MySQL 8 database --
  # Credentials come from environment variables, never hardcoded.
  # The healthcheck lets backend wait until MySQL is ready for connections.
  db:
    image: mysql:8.0
    container_name: epicbook-db
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/mysql             # named volume = data persists across restarts
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro   # seed on first start
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # give MySQL 30s to start before health checks begin
    restart: unless-stopped
    networks:
      - epicbook-net

# -- Named volumes --
# Named volumes persist data outside the container lifecycle.
# Without this, database data is lost every time the container restarts.
volumes:
  db-data:

# -- Networks --
# All services share one bridge network so they can reach each other
# by service name. Isolating to a named network prevents accidental
# communication with containers from other projects.
networks:
  epicbook-net:
    driver: bridge
