# Nginx configuration for serving a React single-page application.
#
# The key requirement for React apps using client-side routing (React Router)
# is the try_files directive. Without it, navigating directly to a route like
# /dashboard would return a 404 from Nginx because that path doesn't exist
# as a real file — only index.html exists. try_files tells Nginx to fall back
# to index.html for any path it can't find, letting React Router handle the routing.

server {
      listen 80;
      server_name _;

      # Serve static files from the build output copied in during the Docker multi-stage build
      root /usr/share/nginx/html;
      index index.html;

      location / {
            # Try to serve the requested file directly first.
            # If it doesn't exist as a file or directory, fall back to index.html.
            # This is what makes React Router work in a containerised environment.
            try_files $uri $uri/ /index.html;
  }

      # Cache static assets aggressively — JS/CSS filenames are hashed by the React build
      # so a new filename = new file, old filename = safely cached
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
  }

      # Security headers
      add_header X-Frame-Options "SAMEORIGIN";
      add_header X-Content-Type-Options "nosniff";
      add_header X-XSS-Protection "1; mode=block";

      # Return 404 for hidden files (e.g. .htaccess, .env)
      location ~ /\. {
            deny all;
  }
}
